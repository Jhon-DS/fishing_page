<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>The Tone Boutique</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <header>
    <h1>Guitar Shop</h1>
    <input type="text" placeholder="Digite o que você procura">
  </header>

  <section class="produtos">
    <div class="produto">
      <img src="img/guitarra1.jpg" alt="Tagima Sixmart">
      <h2>Tagima Sixmart</h2>
      <p class="preco">R$ 16.199,10 no pix</p>
      <button onclick="comprar()">Comprar</button>
    </div>

    <div class="produto">
      <img src="img/guitarra2.png" alt="Jackson King V JS32T Red Ferrari">
      <h2>Jackson King V JS32T Red Ferrari</h2>
      <p class="preco">R$ 10.799,10 no pix</p>
      <button onclick="comprar()">Comprar</button>
    </div>

    <div class="produto">
      <img src="img/guitarra3.jpg" alt="Music Maker Black">
      <h2>Tagima TG-540 Strato HSS Olympic White</h2>
      <p class="preco">R$ 16.199,10 no pix</p>
      <button onclick="comprar()">Comprar</button>
    </div>
  </section>
</body>
</html>
